steps:
  # Build frontend
  - name: 'node:18'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd web_app/frontend
        npm install
        npm run build
        echo "Frontend build completed"

  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dmc-pipeline-management:$SHORT_SHA'
      - '-f'
      - 'web_app/backend/Dockerfile'
      - 'web_app/backend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/dmc-pipeline-management:$SHORT_SHA'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'dmc-pipeline-management'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dmc-pipeline-management:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'PROJECT_ID=$PROJECT_ID,REGION=us-central1,BUCKET=dae-integrador-2025'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'

  # Upload frontend build to Cloud Storage (optional static hosting)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd web_app/frontend
        if [ -d "build" ]; then
          echo "Uploading frontend build to Cloud Storage..."
          gsutil -m cp -r build/* gs://dae-integrador-2025/webapp-static/
          gsutil -m setmeta -h "Cache-Control:public, max-age=3600" gs://dae-integrador-2025/webapp-static/**/*.js
          gsutil -m setmeta -h "Cache-Control:public, max-age=3600" gs://dae-integrador-2025/webapp-static/**/*.css
          echo "Frontend deployed to Cloud Storage"
        else
          echo "No build directory found"
        fi

images:
  - 'gcr.io/$PROJECT_ID/dmc-pipeline-management:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'  # 20 minutes